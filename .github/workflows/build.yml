name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Auto Tag"]
    types:
      - completed

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install PC/SC dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pcscd libpcsclite-dev libgtk-3-dev libwebkit2gtk-4.1-dev

    - name: Install and build frontend
      run: cd frontend && npm ci && npm run build

    - name: Run tests
      run: go test -tags webkit2_41 ./...

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin/arm64
            name: darwin-arm64
          - os: ubuntu-latest
            platform: linux/amd64
            name: linux-amd64
          - os: windows-latest
            platform: windows/amd64
            name: windows-amd64

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pcscd libpcsclite-dev libgtk-3-dev libwebkit2gtk-4.1-dev

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Resolve version tag
      id: version
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        fi

    - name: Build with Wails
      shell: bash
      run: |
        EXTRA_TAGS=""
        if [ "${{ runner.os }}" = "Linux" ]; then
          EXTRA_TAGS="-tags webkit2_41"
        fi
        wails build -ldflags "-X main.version=${{ steps.version.outputs.tag }}" -platform ${{ matrix.platform }} $EXTRA_TAGS

    - name: Create macOS DMG
      if: runner.os == 'macOS'
      run: |
        brew install create-dmg librsvg

        # Gerar icns a partir do SVG
        mkdir -p iconset.iconset
        for size in 16 32 128 256 512; do
          rsvg-convert -w $size -h $size assets/icons/cfs-spool.svg -o iconset.iconset/icon_${size}x${size}.png
          double=$((size * 2))
          rsvg-convert -w $double -h $double assets/icons/cfs-spool.svg -o iconset.iconset/icon_${size}x${size}@2x.png
        done
        rsvg-convert -w 1024 -h 1024 assets/icons/cfs-spool.svg -o iconset.iconset/icon_512x512@2x.png
        iconutil -c icns iconset.iconset -o app.icns
        cp app.icns "build/bin/CFS Spool.app/Contents/Resources/app.icns"

        # Codesign ad-hoc APÓS todas as modificações no .app bundle
        # Assinar de dentro para fora (binário primeiro, depois o bundle)
        codesign -s - --force --options runtime "build/bin/CFS Spool.app/Contents/MacOS/CFS Spool"
        codesign -s - --force --options runtime "build/bin/CFS Spool.app"
        # Verificar se a assinatura é válida
        codesign --verify --verbose "build/bin/CFS Spool.app"

        # Gerar background do DMG
        rsvg-convert -w 600 -h 400 assets/dmg-background.svg -o dmg-background.png

        # Criar DMG com drag-to-Applications
        create-dmg \
          --volname "CFS Spool ${{ steps.version.outputs.tag }}" \
          --background "dmg-background.png" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "CFS Spool.app" 150 200 \
          --hide-extension "CFS Spool.app" \
          --app-drop-link 450 200 \
          "build/bin/cfs-spool.dmg" \
          "build/bin/CFS Spool.app"

    - name: Upload macOS DMG
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: cfs-spool-${{ matrix.name }}
        path: build/bin/cfs-spool.dmg

    - name: Upload build artifacts
      if: runner.os != 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: cfs-spool-${{ matrix.name }}
        path: build/bin/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true
        fetch-depth: 0

    - name: Resolve release tag
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "name=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
        fi

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Fix Linux binary permissions
      run: |
        chmod +x artifacts/cfs-spool-linux-amd64/cfs-spool || true

    - name: Organize release files
      run: |
        mkdir -p release-files
        for dir in artifacts/cfs-spool-*/; do
          platform=$(basename "$dir")
          # macOS: DMG já é arquivo único, copiar direto
          if [[ "$platform" == *darwin* ]]; then
            cp "$dir"/*.dmg "release-files/${platform}.dmg"
          else
            cd "$dir"
            zip -r "../../release-files/${platform}.zip" .
            cd ../..
          fi
        done
        ls -la release-files/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## CFS Spool ${{ steps.tag.outputs.name }}

          Native desktop application for reading and writing Creality CFS RFID tags.
          Built with Wails v2 + React + shadcn/ui.

          ### Downloads

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | `cfs-spool-darwin-arm64.dmg` |
          | Linux (x86_64) | `cfs-spool-linux-amd64.zip` |
          | Windows (x86_64) | `cfs-spool-windows-amd64.zip` |

          ### Quick Start

          - **macOS**: Abra o DMG e arraste para Applications
          - **Linux/Windows**: Extraia o ZIP e execute o binário `cfs-spool`
          - Conecte o leitor ACR122U RFID

          ### macOS: Aviso de segurança

          Como o app não é assinado com certificado Apple Developer, o macOS pode bloquear a execução.
          Execute no Terminal para liberar:
          ```
          xattr -cr /Applications/CFS\ Spool.app
          ```
          Ou clique com botão direito no app → "Abrir" para autorizar manualmente.

          ### Prerequisites

          - **RFID Reader**: ACR122U or compatible
          - **Linux**: `sudo apt install pcscd libpcsclite1`
          - **macOS / Windows**: PC/SC is built-in
        files: |
          release-files/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
